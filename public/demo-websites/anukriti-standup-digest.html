<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily stand-up digest demo</title><link rel="stylesheet" href="/demo-websites/anukriti-demo.css"></head><body><main class="wrap"><span class="tag">CHAYYA CONTROLLED DEMO · BROWSER JOB 4 OF 5</span><section class="panel"><h1>Daily stand-up digest</h1><p>A stable productivity demo page. It creates a local draft only; it does not send a message, post to a chat service, or contact a manager.</p><label for="highlights">Today’s highlights</label><input id="highlights" aria-label="Today’s highlights" value=""><button id="build">Create digest</button><section id="result" class="result" hidden><h2>Daily stand-up digest ready</h2><p id="summary"></p><div class="cards"><div><b>PROGRESS</b>Reusable work</div><div><b>BLOCKER</b>None recorded</div><div><b>NEXT</b>Human review</div></div></section></section></main><script>document.querySelector('#build').addEventListener('click',()=>{const highlights=document.querySelector('#highlights').value||'A focused workday';document.querySelector('#summary').textContent=`A local digest for “${highlights}” is ready for review.`;document.querySelector('#result').hidden=false;});</script></body></html>
