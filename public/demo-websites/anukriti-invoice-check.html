<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Invoice exception check demo</title><link rel="stylesheet" href="/demo-websites/anukriti-demo.css"></head><body><main class="wrap"><span class="tag">ANUKRITI CONTROLLED DEMO · BROWSER JOB 5 OF 5</span><section class="panel"><h1>Invoice exception check</h1><p>A stable local routing demo. It makes no financial decision, payment, or external update.</p><label for="invoice">Invoice ID</label><input id="invoice" aria-label="Invoice ID" value=""><label for="band">Amount band</label><select id="band" aria-label="Amount band"><option value="pass">Within policy</option><option value="review">Needs review</option></select><button id="check">Check invoice</button><section id="result" class="result" hidden><h2>Invoice check ready</h2><p id="summary"></p><div class="cards"><div><b>ROUTE</b>Human review</div><div><b>RULE</b>Fixed demo policy</div><div><b>PROOF</b>Local only</div></div></section></section></main><script>document.querySelector('#check').addEventListener('click',()=>{const invoice=document.querySelector('#invoice').value||'INV-0000';const band=document.querySelector('#band').value;document.querySelector('#summary').textContent=`${invoice} is ready for the ${band} demo route.`;document.querySelector('#result').hidden=false;});</script></body></html>
