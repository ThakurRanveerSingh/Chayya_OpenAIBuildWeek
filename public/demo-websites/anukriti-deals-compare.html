<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Deals comparison demo</title><link rel="stylesheet" href="/demo-websites/anukriti-demo.css"></head><body><main class="wrap"><span class="tag">ANUKRITI CONTROLLED DEMO · BROWSER JOB 3 OF 3</span><section class="panel"><h1>Best-deals comparison</h1><p>A stable purchase-research demo. It does not contact stores, create an order, or use live prices.</p><label for="item">Item to compare</label><input id="item" aria-label="Item to compare" value=""><label for="budget">Budget</label><select id="budget" aria-label="Budget"><option value="50">Under $50</option><option value="80">Under $80</option><option value="120">Under $120</option></select><button id="build">Compare deals</button><section id="result" class="result" hidden><h2>Comparison ready</h2><p id="summary"></p><div class="cards"><div><b>TOP MATCH</b>Battery + price</div><div><b>CHECK</b>Return policy</div><div><b>NEXT STEP</b>Human review</div></div></section></section></main><script>document.querySelector('#build').addEventListener('click',()=>{const item=document.querySelector('#item').value||'wireless earbuds';const budget=document.querySelector('#budget').value;document.querySelector('#summary').textContent=`A fixed-demo comparison for ${item} under $${budget} is ready for human review.`;document.querySelector('#result').hidden=false;});</script></body></html>
